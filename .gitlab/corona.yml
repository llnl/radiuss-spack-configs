variables:
  CORONA_JOB_ALLOC: "--queue=pci --exclusive --time-limit=60m --nodes=1 --begin-time=+2s"

.on-corona:
  tags:
    - shell
    - corona
  rules:
    # Runs except if we explicitly deactivate corona by variable.
    - if: '$ON_CORONA == "OFF"'
      when: never
    # A true statement is expected to allow jobs to run. Here is the default.
    - when: on_success

get-spack-corona:
  extends: [.on-corona, .corona-variables]
  stage: setup
  script:
    - flux watch $( flux batch -o output.stdout.type=kvs ${CORONA_JOB_ALLOC} .gitlab/scripts/get-spack)
  needs: []

generate-on-corona:
  extends: [.on-corona, .corona-variables]
  stage: generate
  script:
    - .gitlab/scripts/print-variables
    - flux watch $( flux batch -o output.stdout.type=kvs ${CORONA_JOB_ALLOC} .gitlab/spack/generate-script.sh)
  artifacts:
    paths:
      - "${CI_PROJECT_DIR}/jobs_scratch_dir"
  needs: [get-spack-corona]

build-on-corona:
  extends: [.corona-variables]
  stage: build
  trigger:
    include:
      - artifact: "jobs_scratch_dir/pipeline.yml"
        job: generate-on-corona
      - project: "lc-templates/id_tokens"
        file: "id_tokens.yml"
      - local: ".gitlab/spack/reindex-corona.yml"
    strategy: depend
    forward:
      pipeline_variables: true
  needs: [generate-on-corona]
  rules:
    # Runs except if we explicitly deactivate corona by variable.
    - if: '$ON_CORONA == "OFF"'
      when: never
    - when: on_success

rm-spack-corona:
  extends: [.on-corona, .corona-variables]
  stage: clean
  script:
    - flux watch $( flux batch -o output.stdout.type=kvs ${CORONA_JOB_ALLOC} .gitlab/scripts/remove-spack)
  needs: [build-on-corona]

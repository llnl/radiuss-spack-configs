include:
  - local: ".gitlab/spack/reindex-override.yml"

rebuild-index-tioga:
  stage: .post
  tags: [tioga, shell]
  when: always
  script:
    - flux watch $( flux batch -o output.stdout.type=kvs ${TIOGA_JOB_ALLOC} .gitlab/spack/reindex-script.sh)
  dependencies: []
  retry: 2
